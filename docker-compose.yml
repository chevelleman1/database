services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: main_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - dock_network

  flyway:
    image: flyway/flyway:10-alpine

    command: >
      -url=jdbc:postgresql://db:5432/main_db 
      -user=${POSTGRES_USER} 
      -password=${POSTGRES_PASSWORD} 
      -connectRetries=60 
      migrate
    volumes:
      - ${WORKSPACE}/migrations:/flyway/sql
    depends_on:
      - db
    networks:
      - dock_network

volumes:
  pg_data:
networks:
  dock_network:
    name: dock_network # Forces a specific name for your Jenkinsfile to use
    driver: bridge
